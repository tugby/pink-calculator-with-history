<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator">
        <input id="display" readonly>
        <div id="keys">
            <button onclick="deleteLast()" class="operator-button">Del</button>
            <button onclick="clearDisplay()" class="operator-button">C</button>
            <button onclick="calculatePercentage()" class="operator-button">%</button>
            <button onclick="appendToDisplay('/')" class="operator-button">/</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('*')" class="operator-button">*</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('-')" class="operator-button">-</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('+')" class="operator-button">+</button>
            <button onclick="showHistory()" class="operator-button">◴</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()" class="operator-button">=</button>


        </div>

    </div>

    <script src="index.js"></script>

    <div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeHistory()">&times;</span>
        <h3>History</h3>
        <ul id="historyList">
            </ul>
        <button onclick="history = []; showHistory();" style="background: #ff4d6d; margin-top:10px;" class="clear-button">Clear</button>
    </div>
</div>
</body>
</html>
